# Runs all unit tests for urule repos inside Docker containers.
# Usage:
#   docker compose -f docker-compose.tests.yaml up --build --abort-on-container-exit
#   # or run a single repo's tests:
#   docker compose -f docker-compose.tests.yaml up --build test-spec
#
# Path conventions (relative to this file at urule-repos/urule/infra/compose/):
#   monorepo packages/services/plugins → ../../packages/<x>, ../../services/<x>, ../../plugins/<x>
#   monorepo apps                       → ../../apps/<x>
#   standalone repos                    → ../../../<repo>
#   shared test Dockerfile              → ../../infra/docker/Dockerfile.test (monorepo)
#                                         ../urule/infra/docker/Dockerfile.test (standalone)

services:
  test-spec:
    build:
      context: ../../packages/spec
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  test-events:
    build:
      context: ../../packages/events
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  test-orchestrator-contract:
    build:
      context: ../../../orchestrator-contract
      dockerfile: ../urule/infra/docker/Dockerfile.test
    working_dir: /app

  test-langgraph-adapter:
    build:
      context: ../../../langgraph-adapter
      dockerfile: ../urule/infra/docker/Dockerfile.test
    working_dir: /app

  test-runtime-broker:
    build:
      context: ../../../runtime-broker
      dockerfile: ../urule/infra/docker/Dockerfile.test
    working_dir: /app

  # Phase 2 repos
  test-authz:
    build:
      context: ../../packages/authz
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  test-packages:
    build:
      context: ../../services/packages
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  test-packagehub:
    build:
      context: ../../services/packagehub
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  test-mcp-gateway:
    build:
      context: ../../../mcp-gateway
      dockerfile: ../urule/infra/docker/Dockerfile.test
    working_dir: /app

  test-backstage-plugin:
    build:
      context: ../../plugins/backstage
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  # Phase 3 repos
  test-approvals:
    build:
      context: ../../../approvals
      dockerfile: ../urule/infra/docker/Dockerfile.test
    working_dir: /app

  test-governance:
    build:
      context: ../../services/governance
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  # Phase 4 repos
  test-channel-router:
    build:
      context: ../../../channel-router
      dockerfile: ../urule/infra/docker/Dockerfile.test
    working_dir: /app

  test-widget-sdk:
    build:
      context: ../../../widget-sdk
      dockerfile: ../urule/infra/docker/Dockerfile.test
    working_dir: /app

  test-state:
    build:
      context: ../../services/state
      dockerfile: ../../infra/docker/Dockerfile.test
    working_dir: /app

  # Registry integration tests (needs PostgreSQL)
  test-registry:
    build:
      context: ../../services/registry
      dockerfile: ../../infra/docker/Dockerfile.test
    environment:
      DATABASE_URL: postgres://urule:urule@postgres:5432/registry
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: urule
      POSTGRES_PASSWORD: urule
      POSTGRES_DB: urule
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./init-registry-schema.sh:/docker-entrypoint-initdb.d/02-init-registry-schema.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U urule']
      interval: 3s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ['--jetstream', '--store_dir=/data', '-m', '8222']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8222/healthz || exit 1']
      interval: 3s
      timeout: 3s
      retries: 5
